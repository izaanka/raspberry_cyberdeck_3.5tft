# ─────────────────────────────────────────────────────────────────────────────
# Cyberdeck Terminal Configuration
# After editing, restart the service:  sudo systemctl restart cyberdeck-term
# ─────────────────────────────────────────────────────────────────────────────

[display]
# Display dimensions in LANDSCAPE mode (ILI9486 native portrait is 320×480;
# rotation=90 or 270 gives 480×320 landscape — use one of those for landscape)
width  = 480
height = 320

# Software rotation.  Valid values: 0, 90, 180, 270
#   0   → portrait  320×480
#   90  → landscape 480×320  ← recommended default for LCD35
#  180  → portrait flipped
#  270  → landscape flipped
rotation = 90

# Font size in pixels. Larger = fewer columns but easier to read.
# Recommended range for 480×320: 11–16
font_size = 13

# Target render framerate (SPI transfer limits practical max to ~15 fps)
fps = 20

[spi]
# SPI port and device (SPI0, CE0 = physical pins 19/21/23/24)
port   = 0
device = 0

# BCM GPIO numbers for display control lines
gpio_dc  = 24     # Data/Command  — physical pin 18
gpio_rst = 25     # Reset         — physical pin 22
gpio_bl  = -1     # Backlight (-1 = not connected / always on)

# SPI bus speed in Hz. 32MHz is reliable; try 64000000 if display allows it.
spi_speed_hz = 32000000

[gpio]
# BCM GPIO number for the kill-switch pin (physical pin 40 = BCM 21)
kill_switch_pin  = 21
pull_up          = true
poll_interval_ms = 50

[terminal]
shell       = /bin/bash
# Command injected into bash on startup (shows system stats).
# Set blank to skip:  startup_cmd =
startup_cmd = python3 /opt/cyberdeck-term/sysinfo.py

[colors]
# Default foreground / background (R,G,B) used when no ANSI color is active
default_fg = 204,204,204
default_bg = 12,12,12
